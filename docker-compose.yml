services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: centific
    ports:
      # Avoid conflict with a local Postgres on host :5432; app + Alembic use :5433
      - "5433:5432"
    volumes:
      - centific_pg:/var/lib/postgresql/data

volumes:
  centific_pg:
